<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Every Minute</title>
    <style>
        /* Base Reset & Vibe */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Courier New', Courier, monospace; /* Typewriter feel */
        }
        
        body {
            background-color: #0d0d12; /* Deep pensive dark background */
            color: #eaeaea;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            width: 100%;
        }

        /* Typography */
        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            font-weight: normal;
            letter-spacing: 2px;
        }

        p.subtitle {
            font-size: 1.2rem;
            color: #888;
            margin-bottom: 50px;
            font-style: italic;
        }

        /* The Live Counter Grid */
        .timer-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
        }

        .time-block {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            padding: 20px;
            min-width: 120px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease;
        }

        .time-block:hover {
            transform: translateY(-5px);
        }

        .time-value {
            display: block;
            font-size: 3.5rem;
            font-weight: bold;
            color: #e0aaff; /* Subtle neon purple/pink */
            text-shadow: 0 0 10px rgba(224, 170, 255, 0.4);
        }

        .time-label {
            display: block;
            font-size: 1rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-top: 5px;
        }

        /* The "Total Minutes" Special Callout */
        .total-minutes-box {
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .total-minutes-box p {
            font-size: 1.5rem;
            color: #ccc;
        }

        .highlight-minute {
            color: #ff9eeb;
            font-weight: bold;
            font-size: 2rem;
            text-shadow: 0 0 15px rgba(255, 158, 235, 0.5);
        }
        
        /* Mobile Responsiveness */
        @media (max-width: 600px) {
            .time-block {
                min-width: 45%; /* Two per row on small screens */
                padding: 15px;
            }
            .time-value {
                font-size: 2.5rem;
            }
            h1 {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>For Every Minute I Missed...</h1>
        <p class="subtitle">I'll be counting the rest of them.</p>

        <div class="timer-grid">
            <div class="time-block">
                <span id="years" class="time-value">0</span>
                <span class="time-label">Years</span>
            </div>
            <div class="time-block">
                <span id="days" class="time-value">0</span>
                <span class="time-label">Days</span>
            </div>
            <div class="time-block">
                <span id="hours" class="time-value">00</span>
                <span class="time-label">Hours</span>
            </div>
            <div class="time-block">
                <span id="minutes" class="time-value">00</span>
                <span class="time-label">Minutes</span>
            </div>
            <div class="time-block">
                <span id="seconds" class="time-value">00</span>
                <span class="time-label">Seconds</span>
            </div>
        </div>

        <div class="total-minutes-box">
            <p>We've been building our story for exactly <br><span id="total-minutes" class="highlight-minute">0</span><br> total minutes.</p>
        </div>
    </div>

    <script>
        // Set the exact start date: April 30, 2024 at 12:00 PM
        const startDate = new Date('April 30, 2024 12:00:00').getTime();

        function updateCounter() {
            const now = new Date().getTime();
            const difference = now - startDate;

            if (difference < 0) return; // Prevent errors if checking before the date

            // Calculate total overall minutes for the highlight
            const totalMinutes = Math.floor(difference / (1000 * 60));
            document.getElementById("total-minutes").innerText = totalMinutes.toLocaleString();

            // Calculate exact breakdown
            // Using 365.25 to account for leap years
            const years = Math.floor(difference / (1000 * 60 * 60 * 24 * 365.25));
            const days = Math.floor((difference % (1000 * 60 * 60 * 24 * 365.25)) / (1000 * 60 * 60 * 24));
            const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((difference % (1000 * 60)) / 1000);

            // Update the HTML elements and ensure 2-digit formatting for time
            document.getElementById("years").innerText = years;
            document.getElementById("days").innerText = days;
            document.getElementById("hours").innerText = hours.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = minutes.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = seconds.toString().padStart(2, '0');
        }

        // Run once immediately to avoid 1-second delay, then set interval
        updateCounter();
        setInterval(updateCounter, 1000);
    </script>
</body>
</html>
